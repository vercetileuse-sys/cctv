<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCTV Dashboard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090f;--s1:#0c1018;--s2:#131a24;--s3:#1a2333;
  --blue:#4f8ef7;--blue2:#7eb3ff;--cyan:#22d3ee;
  --green:#22c55e;--red:#f43f5e;
  --text:#eef2ff;--text2:#94a3b8;--text3:#475569;
  --border:rgba(255,255,255,0.07);--border2:rgba(79,142,247,0.35);
}
body{
  background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* Ambient background */
body::before{content:'';position:fixed;top:-30%;left:-10%;width:60%;height:80%;
  background:radial-gradient(ellipse,rgba(79,142,247,0.08) 0%,transparent 65%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:70%;
  background:radial-gradient(ellipse,rgba(168,85,247,0.06) 0%,transparent 65%);pointer-events:none}

/* Grid overlay */
.grid-bg{position:fixed;inset:0;
  background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}

.login-wrap{
  position:relative;z-index:1;width:100%;max-width:420px;padding:20px;
}

.login-card{
  background:var(--s1);border:1px solid var(--border);border-radius:20px;
  padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,0.5);
  animation:slideUp 0.4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo-box{width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#4f8ef7,#a855f7);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 6px 20px rgba(79,142,247,0.4);flex-shrink:0}
.logo-txt{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo-txt em{color:var(--blue);font-style:normal}
.login-tagline{font-size:10px;color:var(--text3);letter-spacing:2.5px;
  text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:32px}

/* Divider */
.divider{height:1px;background:var(--border);margin-bottom:28px}

.login-heading{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px;font-family:'JetBrains Mono',monospace}

/* Form */
.form-group{margin-bottom:18px}
.form-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);font-family:'JetBrains Mono',monospace;display:block;margin-bottom:8px}
.form-input{
  width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;color:var(--text);font-family:'Sora',sans-serif;
  font-size:14px;outline:none;transition:all 0.2s;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,0.12)}
.form-input::placeholder{color:var(--text3)}

/* Password toggle */
.pass-wrap{position:relative}
.pass-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;
  transition:color 0.15s;padding:0;line-height:1
}
.pass-toggle:hover{color:var(--text2)}

/* Error */
.error-msg{
  background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);
  border-radius:8px;padding:10px 14px;color:#fb7185;font-size:13px;
  margin-bottom:18px;display:flex;align-items:center;gap:8px;
}

/* Submit btn */
.login-btn{
  width:100%;padding:13px;background:var(--blue);color:#fff;border:none;
  border-radius:10px;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.2px;
  box-shadow:0 4px 20px rgba(79,142,247,0.4);
}
.login-btn:hover{background:#3d7ef5;transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,142,247,0.5)}
.login-btn:active{transform:translateY(0)}

/* Footer */
.login-footer{text-align:center;margin-top:24px;font-size:11px;color:var(--text3);
  font-family:'JetBrains Mono',monospace}

/* Scanning dots animation */
.dots{display:flex;justify-content:center;gap:6px;margin-top:20px}
.dot-anim{width:5px;height:5px;border-radius:50%;background:var(--blue);
  animation:dotPulse 1.4s ease-in-out infinite}
.dot-anim:nth-child(2){animation-delay:0.2s}
.dot-anim:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="login-wrap">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-box">📹</div>
      <div class="logo-txt">CC<em>TV</em></div>
    </div>
    <div class="login-tagline">Surveillance Management System</div>
    <div class="divider"></div>
    <div class="login-heading">Welcome Back</div>
    <div class="login-sub">Sign in to access the control center</div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username"
               placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-wrap">
          <input class="form-input" type="password" name="password"
                 id="passInput" placeholder="Enter password"
                 autocomplete="current-password" required>
          <button type="button" class="pass-toggle" onclick="togglePass()" id="passToggle">👁</button>
        </div>
      </div>
      <button type="submit" class="login-btn">🔐 Sign In</button>
    </form>

    <div class="login-footer">
      Aura Jewels CCTV &nbsp;·&nbsp; Secure Access
    </div>
    <div class="dots">
      <div class="dot-anim"></div>
      <div class="dot-anim"></div>
      <div class="dot-anim"></div>
    </div>
  </div>
</div>
<script>
function togglePass(){
  var inp=document.getElementById('passInput');
  var btn=document.getElementById('passToggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}
// Focus username on load
document.querySelector('input[name=username]').focus();
</script>
</body>
</html>
